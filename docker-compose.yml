services:

# Backend services
  backend:
    restart: unless-stopped
    env_file:
    - ./backend/.env
    container_name: backend-app
    build:
      context: "./backend"
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - WSGI_HOST=0.0.0.0
      - PORT=8000
    depends_on:
      - db
    volumes:
      - ./backend:/app

  db:
    restart: unless-stopped
    container_name: db
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres_dev
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: {}