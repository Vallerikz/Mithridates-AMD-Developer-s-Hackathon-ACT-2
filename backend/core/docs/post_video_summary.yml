tags:
  - Video

summary: Generate or update video summary

description: >
  Generates a new summary for a video session's transcribed sentences,
  or updates an existing one, depending on the requested action.

parameters:
  - in: path
    name: video_id
    required: true
    type: integer
    description: ID of the video session.

  - in: body
    name: body
    required: true
    schema:
      type: object
      required:
        - action
      properties:
        action:
          type: string
          enum: [generate, update]
          description: >
            "generate" returns the existing summary if one exists,
            otherwise generates a new one.
            "update" always regenerates the summary, overwriting
            any existing one.
          example: generate

responses:
  200:
    description: Video summary retrieved or generated successfully.
    schema:
      type: object
      properties:
        video_id:
          type: integer
          example: 1
        summary:
          type: string
          example: >
            The speaker discussed climate change, renewable energy,
            and concluded that investment in solar power is increasing.

  400:
    description: Missing or invalid 'action' field.
    schema:
      type: object
      properties:
        message:
          type: string
          example: "'action' is a required property"

  404:
    description: Video session not found.
    schema:
      type: object
      properties:
        message:
          type: string
          example: Video session not found.

  500:
    description: Failed to generate or save summary.
    schema:
      type: object
      properties:
        error:
          type: string
          example: Failed to save summary.