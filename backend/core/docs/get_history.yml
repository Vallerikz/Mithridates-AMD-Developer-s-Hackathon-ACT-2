tags:
  - Video

summary: Retrieves past video sessions.

description: >
  Retrieves a paginated list of past video sessions from the database,
  ordered by most recently created first.

parameters:
  - name: page
    in: query
    type: integer
    required: false
    default: 1
    description: Page number to retrieve.
  - name: per_page
    in: query
    type: integer
    required: false
    default: 20
    description: Number of items per page (max 100).

responses:
  200:
    description: Video sessions fetched successfully.
    schema:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              video_id:
                type: integer
                example: 1
              summary_text:
                type: string
                example: >
                  The speaker discussed climate change, renewable energy,
                  and concluded that investment in solar power is increasing.
              created_at:
                type: string
                format: date-time
                example: "2026-11-11T14:30:00Z"